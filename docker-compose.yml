services:
  db:
    container_name: student-spring-boot
    image: postgres:latest
    environment:
      POSTGRES_USER: studentcode
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "4444:5432"
    networks:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge
volumes:
  db: